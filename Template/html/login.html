<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Forum</title>
    <link rel="stylesheet" href="../Template/css/login.css">
    <style>
        .error-message {
            color: red;
            font-size: 12px;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <form id="loginForm" action="/login" method="post">
            <h2>Login</h2>
            <div class="input-field">
                <input type="text" id="username" name="username" required>
                <label>Username</label>
                <small id="usernameError" class="error-message"></small>
            </div>
            <div class="input-field">
                <input type="password" id="password" name="password" required>
                <label>Password</label>
                <small id="passwordError" class="error-message"></small>
            </div>
            <button type="submit" id="loginButton">Log In</button>
            <p class="register">Don't have an account? <a href="/register">Register</a></p>
            <small id="generalError" class="error-message"></small>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            document.getElementById("usernameError").textContent = "";
            document.getElementById("passwordError").textContent = "";
            document.getElementById("generalError").textContent = "";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();

            let hasError = false;
            if (username.length < 3) {
                document.getElementById("usernameError").textContent = "Username must be at least 3 characters.";
                hasError = true;
            }
            if (password.length < 8) {
                document.getElementById("passwordError").textContent = "Password must be at least 8 characters.";
                hasError = true;
            }

            if (hasError) return;

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/x-www-form-urlencoded",
                    },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`,
                });

                if (response.ok) {
                    window.location.href = "/";
                } else if (response.status === 401) {
                    document.getElementById("generalError").textContent = "Invalid username or password.";
                } else {
                    document.getElementById("generalError").textContent = "An unexpected error occurred. Please try again.";
                }
            } catch (error) {
                document.getElementById("generalError").textContent = "Unable to connect to the server. Please try again.";
            }
        });
    </script>
</body>

</html>
