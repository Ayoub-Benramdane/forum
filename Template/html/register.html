<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./Template/css/register.css">
    <title>Sign Up - Forum</title>
</head>

<body>

    <form action="/register" method="POST" id="signupForm" class="form">
        <p class="title">Register </p>
        <p class="message">Signup now and get full access to our app. </p>
        <label>
            <input type="text" id="username" name="username" class="input" required minlength="3" maxlength="20"
                pattern="^[a-zA-Z0-9_]+$"
                title="Username must be 3-20 characters, only letters, numbers, and underscores">
            <span>Username</span>
        </label>
        <label>
            <input type="email" id="email" name="email" class="input" required>
            <span>Email</span>
        </label>

        <label>
            <input type="password" id="password" name="password" class="input" required minlength="8">
            <span>Password</span>
        </label>
        <label>
            <input type="password" id="confirmPassword" name="confirm-password" class="input" required>
            <span>Confirm password</span>
        </label>
        <button class="submit">Submit</button>
        <p class="signin">Already have an acount ? <a href="/login">Signin</a> </p>
    </form>
